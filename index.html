<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic-Table</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&display=swap"
        rel="stylesheet">

</head>

<body>
    <table class="internet-charges">
        <tr>
            <th>Sevice Provider</th>
            <th>Data GB</th>
            <th>Monthly Charges $</th>
            <th id="note">Note</th>
        </tr>

        <tr class="odd-rows">
            <td>Kiwilink</td>
            <td>25</td>
            <td>75</td>
            <td></td>
        </tr>

        <tr class="even-rows">
            <td>Lightwire</td>
            <td>200</td>
            <td>109</td>
            <td>a</td>
        </tr>

        <tr class="odd-rows">
            <td>Now</td>
            <td>20</td>
            <td>70</td>
            <td></td>
        </tr>

        <tr class="even-rows">
            <td>Orcon</td>
            <td>30</td>
            <td>75</td>
            <td></td>
        </tr>

        <tr class="odd-rows">
            <td>Primowireless</td>
            <td>30</td>
            <td>79</td>
            <td></td>
        </tr>

        <tr class="even-rows">
            <td>Snapv</td>
            <td>50</td>
            <td>75</td>
            <td></td>
        </tr>

        <tr class="odd-rows">
            <td>Telecom</td>
            <td>50</td>
            <td>95</td>
            <td></td>
        </tr>

        <tr class="even-rows">
            <td>Ubergroup</td>
            <td>10</td>
            <td>65</td>
            <td></td>
        </tr>
    </table>
</body>

</html>
